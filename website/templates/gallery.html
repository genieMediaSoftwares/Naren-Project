{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">Gallery</h1>

<div class="row">

    {% for item in gallery %}

    <div class="col-md-4 mb-4">

        <div class="card shadow">

            <img src="{{ item.image.url }}" class="card-img-top" height="250">

            <div class="card-body text-center">

                <h5>{{ item.title }}</h5>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
