{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="py-10 sm:py-14 bg-[#f8f5ff]">

    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">

        <!-- HEADING -->

        <div class="text-center mb-10">

            <p class="uppercase tracking-[4px] text-[#5b21b6] font-semibold text-sm mb-4">
                Our Gallery
            </p>

            <h1 class="text-[#08113a]
            text-4xl
            sm:text-5xl
            lg:text-6xl
            font-extrabold">

                Moments & Medical Excellence

            </h1>

        </div>

        <!-- GALLERY GRID -->

        <div class="grid
        grid-cols-1
        sm:grid-cols-2
        lg:grid-cols-3
        gap-6">

            {% for item in gallery %}

            <div class="bg-white rounded-[24px]
            overflow-hidden
            shadow-md
            hover:shadow-2xl
            transition duration-300">

                <!-- IMAGE -->

                <img src="{{ item.image.url }}"
                    alt="{{ item.title }}"
                    class="w-full h-[250px] object-cover">

                <!-- CONTENT -->

                <div class="p-5 text-center">

                    <h3 class="text-[#08113a]
                    text-2xl
                    font-bold">

                        {{ item.title }}

                    </h3>

                </div>

            </div>

            {% empty %}

            <div class="col-span-full text-center py-10">

                <p class="text-gray-500 text-lg">
                    No gallery images available.
                </p>

            </div>

            {% endfor %}

        </div>

    </div>

</section>

{% endblock %}
